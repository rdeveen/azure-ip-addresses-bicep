name: Update Azure Service Tags Bicep files

on:
  schedule:
    # Run every Monday at 06:00 UTC (files are typically published on Mondays)
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  update-bicep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # -----------------------------------------------------------------------
      # Public Cloud
      # -----------------------------------------------------------------------
      - name: Download ServiceTags_Public JSON
        id: download_public
        run: |
          DOWNLOAD_URL=$(curl -sL "https://www.microsoft.com/en-us/download/details.aspx?id=56519" \
            | grep -oP 'https://download\.microsoft\.com/download/[^"]+\.json' \
            | head -1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Could not find download URL for ServiceTags_Public"
            exit 1
          fi
          echo "url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          curl -sL "$DOWNLOAD_URL" -o /tmp/ServiceTags_Public.json
          echo "Downloaded: $DOWNLOAD_URL"

      - name: Convert ServiceTags_Public to Bicep
        run: |
          python scripts/convert-to-bicep.py \
            /tmp/ServiceTags_Public.json \
            ServiceTags_Public.bicep

      # -----------------------------------------------------------------------
      # China Cloud
      # -----------------------------------------------------------------------
      - name: Download ServiceTags_China JSON
        id: download_china
        run: |
          DOWNLOAD_URL=$(curl -sL "https://www.microsoft.com/en-us/download/details.aspx?id=57062" \
            | grep -oP 'https://download\.microsoft\.com/download/[^"]+\.json' \
            | head -1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Could not find download URL for ServiceTags_China"
            exit 1
          fi
          echo "url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          curl -sL "$DOWNLOAD_URL" -o /tmp/ServiceTags_China.json
          echo "Downloaded: $DOWNLOAD_URL"

      - name: Convert ServiceTags_China to Bicep
        run: |
          python scripts/convert-to-bicep.py \
            /tmp/ServiceTags_China.json \
            ServiceTags_China.bicep

      # -----------------------------------------------------------------------
      # Azure Government Cloud
      # -----------------------------------------------------------------------
      - name: Download ServiceTags_AzureGovernment JSON
        id: download_gov
        run: |
          DOWNLOAD_URL=$(curl -sL "https://www.microsoft.com/en-us/download/details.aspx?id=57063" \
            | grep -oP 'https://download\.microsoft\.com/download/[^"]+\.json' \
            | head -1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Could not find download URL for ServiceTags_AzureGovernment"
            exit 1
          fi
          echo "url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          curl -sL "$DOWNLOAD_URL" -o /tmp/ServiceTags_AzureGovernment.json
          echo "Downloaded: $DOWNLOAD_URL"

      - name: Convert ServiceTags_AzureGovernment to Bicep
        run: |
          python scripts/convert-to-bicep.py \
            /tmp/ServiceTags_AzureGovernment.json \
            ServiceTags_AzureGovernment.bicep

      # -----------------------------------------------------------------------
      # Azure Germany Cloud
      # -----------------------------------------------------------------------
      - name: Download ServiceTags_AzureGermany JSON
        id: download_germany
        run: |
          DOWNLOAD_URL=$(curl -sL "https://www.microsoft.com/en-us/download/details.aspx?id=57064" \
            | grep -oP 'https://download\.microsoft\.com/download/[^"]+\.json' \
            | head -1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Could not find download URL for ServiceTags_AzureGermany"
            exit 1
          fi
          echo "url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          curl -sL "$DOWNLOAD_URL" -o /tmp/ServiceTags_AzureGermany.json
          echo "Downloaded: $DOWNLOAD_URL"

      - name: Convert ServiceTags_AzureGermany to Bicep
        run: |
          python scripts/convert-to-bicep.py \
            /tmp/ServiceTags_AzureGermany.json \
            ServiceTags_AzureGermany.bicep

      # -----------------------------------------------------------------------
      # Commit & push if anything changed
      # -----------------------------------------------------------------------
      - name: Commit and push updated Bicep files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ServiceTags_Public.bicep \
                  ServiceTags_China.bicep \
                  ServiceTags_AzureGovernment.bicep \
                  ServiceTags_AzureGermany.bicep
          if git diff --cached --quiet; then
            echo "No changes to commit – Bicep files are already up to date."
          else
            git commit -m "chore: update Azure Service Tags Bicep files [skip ci]"
            git push
          fi

      # -----------------------------------------------------------------------
      # Publish Bicep modules to GHCR
      # -----------------------------------------------------------------------
      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publish Bicep modules to GHCR
        run: |
          VERSION=$(date -u +%Y%m%d)

          bicep publish ServiceTags_Public.bicep \
            --target br:ghcr.io/rdeveen/azure-ip-addresses-bicep/servicetags-public:${VERSION} \
            --force
          bicep publish ServiceTags_Public.bicep \
            --target br:ghcr.io/rdeveen/azure-ip-addresses-bicep/servicetags-public:latest \
            --force

          bicep publish ServiceTags_China.bicep \
            --target br:ghcr.io/rdeveen/azure-ip-addresses-bicep/servicetags-china:${VERSION} \
            --force
          bicep publish ServiceTags_China.bicep \
            --target br:ghcr.io/rdeveen/azure-ip-addresses-bicep/servicetags-china:latest \
            --force

          bicep publish ServiceTags_AzureGovernment.bicep \
            --target br:ghcr.io/rdeveen/azure-ip-addresses-bicep/servicetags-azuregovernment:${VERSION} \
            --force
          bicep publish ServiceTags_AzureGovernment.bicep \
            --target br:ghcr.io/rdeveen/azure-ip-addresses-bicep/servicetags-azuregovernment:latest \
            --force

          bicep publish ServiceTags_AzureGermany.bicep \
            --target br:ghcr.io/rdeveen/azure-ip-addresses-bicep/servicetags-azuregermany:${VERSION} \
            --force
          bicep publish ServiceTags_AzureGermany.bicep \
            --target br:ghcr.io/rdeveen/azure-ip-addresses-bicep/servicetags-azuregermany:latest \
            --force
